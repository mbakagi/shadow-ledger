<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>proofinv — Batch Entry</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="firebase-inv.js"></script>
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .batch-row input { transition: border-color 0.15s; }
    .batch-row input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen">

  <!-- Auth -->
  <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/90 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4 space-y-4">
      <h1 class="text-2xl font-black text-center">proofinv Batch</h1>
      <p class="text-sm text-slate-500 text-center">Sign in for accelerated offline-to-online data entry</p>
      <form id="login-form" class="space-y-3">
        <input id="le" type="email" placeholder="Email" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" />
        <input id="lp" type="password" placeholder="Password" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" />
        <div id="login-err" class="text-red-500 text-xs font-semibold hidden"></div>
        <button id="login-btn" type="submit" class="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold transition">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Header -->
  <nav class="bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between flex-wrap gap-2">
    <h1 class="text-lg font-black mono text-indigo-600 dark:text-indigo-400">proofinv · Batch</h1>
    <div class="flex items-center gap-2">
      <span id="user-badge" class="hidden text-xs text-slate-500 truncate max-w-[140px]"></span>
      <a href="proofinv.html" class="text-xs px-3 py-1.5 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-indigo-100 text-slate-600 transition font-semibold">Dashboard</a>
      <button id="btn-logout" class="hidden text-xs px-3 py-1.5 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-red-100 dark:hover:bg-red-900/30 text-slate-600 transition">Out</button>
    </div>
  </nav>

  <main id="app-main" class="hidden p-4 max-w-6xl mx-auto space-y-4">
    <!-- Session stats -->
    <div class="flex gap-3 flex-wrap">
      <div class="bg-white dark:bg-slate-800 rounded-xl px-4 py-2 border border-slate-200 dark:border-slate-700">
        <span class="text-[10px] uppercase text-slate-400 font-semibold">Committed</span>
        <span id="stat-committed" class="ml-2 font-black text-emerald-600">0</span>
      </div>
      <div class="bg-white dark:bg-slate-800 rounded-xl px-4 py-2 border border-slate-200 dark:border-slate-700">
        <span class="text-[10px] uppercase text-slate-400 font-semibold">Pending</span>
        <span id="stat-pending" class="ml-2 font-black text-amber-500">0</span>
      </div>
      <div class="bg-white dark:bg-slate-800 rounded-xl px-4 py-2 border border-slate-200 dark:border-slate-700">
        <span class="text-[10px] uppercase text-slate-400 font-semibold">Last SKU</span>
        <span id="stat-last" class="ml-2 font-mono text-xs text-slate-600">—</span>
      </div>
    </div>

    <!-- Batch entry form -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-200 dark:border-slate-700 space-y-3">
      <h2 class="font-black text-sm uppercase tracking-wider text-slate-500">Rapid Entry · Press Enter to commit & jump to next row</h2>

      <!-- Column headers -->
      <div class="grid grid-cols-7 gap-2 text-[10px] uppercase tracking-wider text-slate-400 font-semibold border-b border-slate-200 dark:border-slate-700 pb-1.5 px-1">
        <span>SKU</span><span>Item Name</span><span>Room</span><span>Aisle</span><span>Bay</span><span>Bin</span><span>Qty</span>
      </div>

      <!-- 8 rows visible — keyboard-firehose layout -->
      <div id="batch-rows" class="space-y-1.5"></div>

      <!-- Buttons -->
      <div class="flex gap-2 pt-2">
        <button id="btn-commit-all" class="px-4 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm transition">Commit All Pending</button>
        <button id="btn-clear" class="px-4 py-2 rounded-xl bg-slate-200 dark:bg-slate-700 hover:bg-red-100 text-slate-600 dark:text-slate-300 text-sm font-bold transition">Clear Grid</button>
      </div>

      <!-- Audit trail -->
      <details class="mt-2">
        <summary class="text-xs text-slate-400 cursor-pointer font-semibold">Session audit trail (<span id="audit-count">0</span> entries)</summary>
        <div id="audit-log" class="max-h-48 overflow-y-auto scrollbar-thin mt-1 space-y-0.5 text-[11px] font-mono text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-700/50 rounded-lg p-2 border border-slate-200 dark:border-slate-600"></div>
      </details>
    </div>
  </main>

  <script>
  'use strict';
  var D=function(id){return document.getElementById(id);};
  var ROWS=8, committed=0,pending=0;

  // Auth
  auth.onAuthStateChanged(function(u){
    if(u){ D('login-overlay').classList.add('hidden'); D('app-main').classList.remove('hidden');
      D('user-badge').classList.remove('hidden');D('user-badge').textContent=u.email;
      D('btn-logout').classList.remove('hidden'); buildGrid();
    }else{ D('login-overlay').classList.remove('hidden'); D('app-main').classList.add('hidden'); }
  });
  D('login-form').addEventListener('submit',function(e){e.preventDefault();
    var em=D('le').value.trim(),pw=D('lp').value;
    D('login-err').classList.add('hidden'); var b=D('login-btn');
    b.textContent='Signing in…';b.disabled=true;
    auth.signInWithEmailAndPassword(em,pw).catch(function(err){
      var m={'auth/user-not-found':'No account','auth/wrong-password':'Wrong password','auth/invalid-email':'Invalid','auth/too-many-requests':'Too many'};
      D('login-err').textContent=m[err.code]||err.message;D('login-err').classList.remove('hidden');
    }).finally(function(){b.textContent='Sign In';b.disabled=false;});
  });
  D('btn-logout').addEventListener('click',function(){auth.signOut();});

  function toast(m,c){ var d=document.createElement('div');
    d.className='fixed bottom-4 left-1/2 -translate-x-1/2 z-[200] px-4 py-2 rounded-full text-white text-xs font-semibold shadow-lg '+(c==='error'?'bg-red-600':c==='success'?'bg-emerald-600':'bg-slate-700');
    d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove();},2500);
  }

  // Build 8 keyboard-firehose rows
  function buildGrid(){
    var html='';
    for(var i=0;i<ROWS;i++){
      html+='<div class="batch-row grid grid-cols-7 gap-2 items-center px-1" data-row="'+i+'">'
        +'<input data-col="sku"     class="mono px-2 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-xs font-bold focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="SKU" maxlength="60" autocapitalize="characters" spellcheck="false" />'
        +'<input data-col="name"    class="px-2 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-xs focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Item name" maxlength="200" />'
        +'<input data-col="room"    class="mono px-2 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-xs text-center focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="R" maxlength="4" autocapitalize="characters" />'
        +'<input data-col="aisle"   class="mono px-2 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-xs text-center focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="A" maxlength="4" autocapitalize="characters" />'
        +'<input data-col="bay"     class="mono px-2 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-xs text-center focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="B" maxlength="4" autocapitalize="characters" />'
        +'<input data-col="bin"     class="mono px-2 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-xs text-center focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="B" maxlength="4" autocapitalize="characters" />'
        +'<input data-col="qty"     class="mono px-2 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-xs text-center font-bold focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Qty" type="number" min="1" value="1" />'
        +'</div>';
    }
    D('batch-rows').innerHTML=html;

    // Wire Enter → commit + jump
    D('batch-rows').addEventListener('keydown',function(e){
      if(e.key!=='Enter')return;
      var inp=e.target, row=inp.closest('.batch-row');
      if(!row||inp.tagName!=='INPUT')return;
      e.preventDefault();

      // Was Enter pressed on the LAST qty field? If so, commit the row.
      var isQty = inp.dataset.col==='qty';
      if(isQty){
        commitRow(row);
      }
      else{
        // Jump to next field inside this row
        var inputs=Array.from(row.querySelectorAll('input'));
        var idx=inputs.indexOf(inp);
        if(idx<inputs.length-1){inputs[idx+1].focus();inputs[idx+1].select();}
      }
    });
  }

  function getRowData(row){
    var d={sku:'',name:'',room:'',aisle:'',bay:'',bin:'',qty:0};
    ['sku','name','room','aisle','bay','bin','qty'].forEach(function(c){
      var inp=row.querySelector('[data-col="'+c+'"]');
      if(inp){
        var v=inp.value;
        if(c==='sku'||c==='room'||c==='aisle'||c==='bay'||c==='bin'){
          d[c]=String(v).trim().toUpperCase().replace(/[^A-Z0-9\-_\.]/g,'');
        }else if(c==='name'){
          d[c]=String(v).trim();
        }else if(c==='qty'){
          d[c]=Math.max(1,parseInt(v,10)||1);
        }
      }
    });
    return d;
  }

  function commitRow(row){
    var d=getRowData(row);
    if(!d.sku||!d.room||!d.aisle||!d.bay||!d.bin){toast('Fill all position fields','error');return;}
    if(!d.name){toast('Item name required','error');return;}

    var docId = d.sku + '_R'+d.room+'_A'+d.aisle+'_B'+d.bay+'_B'+d.bin;
    var ref = db.collection('inventory').doc(docId);

    // runTransaction to safely increment
    pending++;
    D('stat-pending').textContent=pending;
    // Mark row as locked
    row.querySelectorAll('input').forEach(function(i){i.disabled=true;i.classList.add('bg-green-50','dark:bg-green-900/20');});

    db.runTransaction(function(tx){
      return tx.get(ref).then(function(doc){
        var oldQty = doc.exists ? Math.max(0, Number(doc.data().quantity)||0) : 0;
        var newQty = oldQty + d.qty;
        tx.set(ref,{
          sku:d.sku,item_name:d.name,
          room:d.room,aisle:d.aisle,bay:d.bay,bin:d.bin,
          quantity:newQty,
          updated_at:firebase.firestore.FieldValue.serverTimestamp()
        },{merge:true});

        // Audit log
        var audit = docId.substr(0,8)+'… +'+d.qty+' ('+oldQty+'→'+newQty+')';
        addAudit(audit);
      });
    }).then(function(){
      committed++; pending--;
      D('stat-committed').textContent=committed;
      D('stat-pending').textContent=pending;
      D('stat-last').textContent=d.sku;

      // Reset row inputs and jump to next row's SKU
      row.querySelectorAll('input').forEach(function(i){i.disabled=false;i.classList.remove('bg-green-50','dark:bg-green-900/20');});
      ['sku','name','room','aisle','bay','bin','qty'].forEach(function(c){
        var inp=row.querySelector('[data-col="'+c+'"]');
        if(inp){if(c==='qty')inp.value=1;else inp.value='';}
      });

      // Jump to next row's SKU field
      var ri=parseInt(row.dataset.row,10);
      if(ri<ROWS-1){
        var nxt=D('batch-rows').querySelector('.batch-row[data-row="'+(ri+1)+'"] input[data-col="sku"]');
        if(nxt){nxt.focus();nxt.select();}
      }else{
        // Wrap to row 0
        var top=D('batch-rows').querySelector('.batch-row[data-row="0"] input[data-col="sku"]');
        if(top){top.focus();top.select();}
        toast('Wrapped to top row','info');
      }
    }).catch(function(e){
      pending--;
      D('stat-pending').textContent=pending;
      row.querySelectorAll('input').forEach(function(i){i.disabled=false;i.classList.remove('bg-green-50','dark:bg-green-900/20');});
      toast('Tx failed: '+e.message,'error');
    });
  }

  // Audit trail
  function addAudit(line){
    var div=document.createElement('div');
    div.textContent = (auditCount+1) + '. ' + line;
    D('audit-log').prepend(div);
    auditCount++;
    D('audit-count').textContent=auditCount;
  }
  var auditCount=0;

  // Commit all rows that have filled fields (not empty SKU)
  function commitAll(){
    var all=Array.from(D('batch-rows').querySelectorAll('.batch-row'));
    all.forEach(function(row){
      var inp=row.querySelector('input[data-col="sku"]');
      if(inp&&inp.value.trim()&&!inp.disabled) { commitRow(row); }
    });
  }
  D('btn-commit-all').addEventListener('click',commitAll);

  // Clear grid
  D('btn-clear').addEventListener('click',function(){
    D('batch-rows').querySelectorAll('input').forEach(function(i){i.value='';i.disabled=false;i.classList.remove('bg-green-50','dark:bg-green-900/20');});
    var top=D('batch-rows').querySelector('.batch-row[data-row="0"] input[data-col="sku"]');
    if(top){top.focus();}
    toast('Grid cleared','info');
  });

  // Status bar update on commit
  setInterval(function(){D('stat-committed').textContent=committed;D('stat-pending').textContent=pending;},500);
  </script>
</body>
</html>
