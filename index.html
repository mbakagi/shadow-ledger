<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WMS Master Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <style>
    body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .loc-badge { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 0.25rem; white-space: nowrap; margin-right: 0.25rem; margin-bottom: 0.25rem; display: inline-block; background-color: #334155; color: #cbd5e1; border: 1px solid #475569; }
    .loc-badge .qty { color: #38bdf8; font-weight: bold; }
  </style>
</head>
<body class="bg-slate-900 text-slate-300 min-h-screen">

  <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold text-white flex items-center gap-2">
          <svg class="w-6 h-6 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>
          Live Inventory Dashboard
        </h1>
        <p class="text-sm text-slate-400 mt-1">Real-time Chaotic Storage view.</p>
      </div>
      <div class="flex items-center gap-4">
        <a href="mobile.html" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded shadow transition text-sm">Launch Mobile Scanner</a>
        <div class="text-xs text-right">
          <p class="text-slate-500">Live Connection</p>
          <div class="flex items-center gap-1 justify-end">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-emerald-400 font-mono" id="status-indicator">Connected</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between items-end mb-4">
      <div>
        <h2 class="text-xl font-bold text-white">Master Stock Table</h2>
        <p class="text-sm text-slate-400">Total Unique SKUs: <span id="total-skus" class="font-bold text-slate-200">0</span></p>
      </div>
      <div class="w-64">
        <input type="text" id="table-search" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500" placeholder="Filter SKU or Name...">
      </div>
    </div>

    <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden shadow-xl">
      <div class="overflow-x-auto max-h-[70vh]">
        <table class="w-full text-left text-sm whitespace-nowrap">
          <thead class="bg-slate-900/80 text-slate-400 uppercase text-xs tracking-wider sticky top-0 z-10 backdrop-blur-sm">
            <tr>
              <th class="px-6 py-4 font-semibold w-48">SKU</th>
              <th class="px-6 py-4 font-semibold">Item Name</th>
              <th class="px-6 py-4 font-semibold text-right w-32">Total Qty</th>
              <th class="px-6 py-4 font-semibold">Added to Bin (Locations)</th>
            </tr>
          </thead>
          <tbody id="inventory-tbody" class="divide-y divide-slate-700/50">
            <tr>
              <td colspan="4" class="px-6 py-12 text-center text-slate-500">
                <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-emerald-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Listening to Firestore...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const app = initializeApp(window.firebaseConfig);
    const db = getFirestore(app);

    let masterData = new Map(); // sku -> { sku, name, totalQty, locations: [] }
    let searchTerm = '';

    // Listen to the flat allocations table in real-time
    const q = query(collection(db, 'inventory'));
    onSnapshot(q, (snapshot) => {
      // Rebuild the map on every change to ensure deleted allocations are handled cleanly
      masterData.clear();
      
      snapshot.forEach(doc => {
        const d = doc.data();
        const sku = (d.sku || 'UNKNOWN').toUpperCase();
        
        if (!masterData.has(sku)) {
          masterData.set(sku, {
            sku: sku,
            name: d.item_name || '',
            totalQty: 0,
            locations: []
          });
        }
        
        const entry = masterData.get(sku);
        const qty = parseFloat(d.quantity) || 0;
        
        entry.totalQty += qty;
        
        // Push this explicit location
        entry.locations.push({
          room: d.room || '-',
          aisle: d.aisle || '-',
          bay: d.bay || '-',
          bin: d.bin || '-',
          qty: qty
        });
      });
      
      renderTable();
    }, (error) => {
      console.error("Firebase listen error:", error);
      document.getElementById('status-indicator').textContent = 'Error';
      document.getElementById('status-indicator').classList.replace('text-emerald-400', 'text-red-400');
    });

    function renderTable() {
      const tbody = document.getElementById('inventory-tbody');
      
      // Convert map to array and sort by SKU
      let rows = Array.from(masterData.values()).sort((a,b) => a.sku.localeCompare(b.sku));
      
      // Filter
      if (searchTerm) {
         rows = rows.filter(r => r.sku.includes(searchTerm) || r.name.toUpperCase().includes(searchTerm));
      }

      document.getElementById('total-skus').textContent = rows.length;

      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-slate-500">No inventory found.</td></tr>`;
        return;
      }

      let html = '';
      rows.forEach(item => {
        
        // Build the concatenated 'Added to Bin' column string
        // Format: "Room 1-Aisle A-Bay 04-Bin 02 (Qty: 10) | ..."
        const locString = item.locations.sort((a,b) => b.qty - a.qty).map(l => {
           return `<span class="loc-badge">${l.room}-${l.aisle}-${l.bay}-${l.bin} (<span class="qty">${l.qty}</span>)</span>`;
        }).join(' ');

        html += `
          <tr class="hover:bg-slate-700/30 transition border-b border-slate-700/50">
            <td class="px-6 py-3 font-mono font-bold text-blue-400">${item.sku}</td>
            <td class="px-6 py-3 text-slate-300 truncate max-w-xs" title="${item.name}">${item.name}</td>
            <td class="px-6 py-3 text-right font-bold text-white">${item.totalQty}</td>
            <td class="px-6 py-3 whitespace-normal leading-tight">${locString}</td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
    }

    document.getElementById('table-search').addEventListener('input', (e) => {
       searchTerm = e.target.value.trim().toUpperCase();
       renderTable();
    });

  </script>
</body>
</html>
