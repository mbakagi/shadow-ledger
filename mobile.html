<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shadow Scanner</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <style>
    body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .module-card { display: none; }
    .module-card.active { display: block; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">

  <!-- AUTH GATEWAY -->
  <div id="auth-gateway" class="fixed inset-0 bg-slate-900 z-50 flex flex-col justify-center items-center p-6 text-white">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-emerald-400 mb-2">Shadow Scanner</h1>
        <p class="text-slate-400">Warehouse Mobility Client</p>
      </div>
      <div id="login-form" class="space-y-4">
        <button id="btn-google-login" class="w-full bg-white text-slate-900 hover:bg-slate-100 font-bold rounded-lg px-4 py-3 transition shadow-lg mt-4 flex items-center justify-center gap-3">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
        <p id="auth-error" class="text-red-400 text-sm text-center hidden"></p>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-40 flex justify-between items-center">
    <div>
      <h1 class="font-bold text-lg leading-tight">Shadow Scanner</h1>
      <p id="user-role-badge" class="text-xs text-emerald-400 font-mono"></p>
    </div>
    <button id="btn-logout" class="text-slate-400 hover:text-white text-sm">Logout</button>
  </header>

  <!-- MAIN MENU -->
  <div id="main-menu" class="p-4 grid grid-cols-2 gap-4 active module-card">
    <button onclick="nav('search')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center gap-3 active:scale-95 transition">
      <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <span class="font-bold text-sm text-center">Search &<br>Count</span>
    </button>
    
    <button onclick="nav('bin')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center gap-3 active:scale-95 transition">
      <div class="w-12 h-12 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
      </div>
      <span class="font-bold text-sm text-center">Location<br>Count</span>
    </button>

    <button onclick="nav('putaway')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center gap-3 active:scale-95 transition">
      <div class="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
      </div>
      <span class="font-bold text-sm text-center">Assign<br>(Putaway)</span>
    </button>

    <button onclick="nav('move')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center gap-3 active:scale-95 transition">
      <div class="w-12 h-12 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
      </div>
      <span class="font-bold text-sm text-center">Move<br>Transfer</span>
    </button>
  </div>

  <!-- MODULE: SEARCH & COUNT -->
  <div id="mod-search" class="module-card">
    <div class="bg-blue-600 text-white p-4 flex items-center gap-3">
      <button onclick="nav('main-menu')" class="p-2 -ml-2"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg></button>
      <h2 class="font-bold text-lg">Search & Count</h2>
    </div>
    <div class="p-4 space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Search SKU</label>
        <div class="flex gap-2">
          <input type="text" id="search-sku" class="w-full bg-white border border-slate-300 rounded-lg px-4 py-3 font-mono focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. SKU-123">
          <button id="btn-do-search" class="bg-blue-600 text-white px-6 rounded-lg font-bold shadow">Go</button>
        </div>
      </div>
      <div id="search-results" class="space-y-3">
        <!-- Results injected here -->
      </div>
    </div>
  </div>

  <!-- MODULE: LOCATION COUNT -->
  <div id="mod-bin" class="module-card">
    <div class="bg-purple-600 text-white p-4 flex items-center gap-3">
      <button onclick="nav('main-menu')" class="p-2 -ml-2"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg></button>
      <h2 class="font-bold text-lg">Location Count</h2>
    </div>
    <div class="p-4 space-y-4">
      <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Target Location</label>
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="lc-room" class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-purple-500 outline-none" placeholder="Room (WH1)">
          <input type="text" id="lc-aisle" class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-purple-500 outline-none" placeholder="Aisle (A)">
          <input type="text" id="lc-bay" class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-purple-500 outline-none" placeholder="Bay (04)">
          <input type="text" id="lc-bin" class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-purple-500 outline-none" placeholder="Bin (02)">
        </div>
        <button id="btn-do-bin" class="w-full bg-purple-600 text-white py-3 rounded-lg font-bold shadow mt-2">Load Location</button>
      </div>
      <div id="bin-results" class="space-y-3">
        <!-- Results injected here -->
      </div>
    </div>
  </div>

  <!-- MODULE: ASSIGN (PUTAWAY) -->
  <div id="mod-putaway" class="module-card">
    <div class="bg-emerald-600 text-white p-4 flex items-center gap-3">
      <button onclick="nav('main-menu')" class="p-2 -ml-2"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg></button>
      <h2 class="font-bold text-lg">Assign (Putaway)</h2>
    </div>
    <form id="form-putaway" class="p-4 space-y-5">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">SKU</label>
        <input type="text" id="put-sku" required class="w-full bg-white border border-slate-300 rounded-lg px-4 py-3 font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="e.g. SKU-123">
      </div>
      <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Target Location</label>
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="put-room" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Room (WH1)">
          <input type="text" id="put-aisle" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Aisle (A)">
          <input type="text" id="put-bay" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Bay (04)">
          <input type="text" id="put-bin" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Bin (02)">
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Quantity to Add</label>
        <input type="number" id="put-qty" required min="1" class="w-full bg-white border border-slate-300 rounded-lg px-4 py-3 font-mono focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="10">
      </div>
      <button type="submit" id="btn-do-putaway" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-md active:scale-95 transition text-lg">Store Item</button>
    </form>
  </div>

  <!-- MODULE: MOVE -->
  <div id="mod-move" class="module-card">
    <div class="bg-amber-500 text-white p-4 flex items-center gap-3">
      <button onclick="nav('main-menu')" class="p-2 -ml-2"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg></button>
      <h2 class="font-bold text-lg">Transfer Stock</h2>
    </div>
    <form id="form-move" class="p-4 space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">SKU</label>
        <input type="text" id="mv-sku" required class="w-full bg-white border border-slate-300 rounded-lg px-4 py-3 font-mono focus:ring-2 focus:ring-amber-500 outline-none" placeholder="e.g. SKU-123">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Quantity to Move</label>
        <input type="number" id="mv-qty" required min="1" class="w-full bg-white border border-slate-300 rounded-lg px-4 py-3 font-mono focus:ring-2 focus:ring-amber-500 outline-none" placeholder="10">
      </div>
      
      <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Source Location</label>
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="mv-src-room" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Room">
          <input type="text" id="mv-src-aisle" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Aisle">
          <input type="text" id="mv-src-bay" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Bay">
          <input type="text" id="mv-src-bin" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Bin">
        </div>
      </div>

      <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Destination Location</label>
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="mv-dest-room" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Room">
          <input type="text" id="mv-dest-aisle" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Aisle">
          <input type="text" id="mv-dest-bay" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Bay">
          <input type="text" id="mv-dest-bin" required class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Bin">
        </div>
      </div>
      
      <button type="submit" id="btn-do-move" class="w-full bg-amber-500 text-white py-4 rounded-xl font-bold shadow-md active:scale-95 transition text-lg mt-2">Transfer Item</button>
    </form>
  </div>

  <div id="toast" class="fixed bottom-4 left-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 text-center font-medium"></div>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, runTransaction, increment, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const app = initializeApp(window.firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    // --- UTILS ---
    window.nav = (id) => {
      document.querySelectorAll('.module-card').forEach(el => el.classList.remove('active'));
      const target = document.getElementById(id === 'main-menu' ? 'main-menu' : 'mod-' + id);
      if(target) target.classList.add('active');
    };

    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `fixed bottom-4 left-4 right-4 px-4 py-3 rounded-lg shadow-xl transform transition-all duration-300 z-50 text-center font-medium ${type === 'error' ? 'bg-red-500' : 'bg-slate-800'}`;
      el.style.transform = 'translateY(0)';
      el.style.opacity = '1';
      setTimeout(() => {
        el.style.transform = 'translateY(20px)';
        el.style.opacity = '0';
      }, 3000);
    }

    // Format Location String
    function formatLoc(data) {
      return `${data.room || '-'}/${data.aisle || '-'}/${data.bay || '-'}/${data.bin || '-'}`;
    }

    // --- AUTH GATEWAY ---
    document.getElementById('btn-google-login').addEventListener('click', async () => {
      const btn = document.getElementById('btn-google-login');
      const err = document.getElementById('auth-error');
      
      btn.disabled = true;
      err.classList.add('hidden');
      
      try {
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        await signInWithPopup(auth, provider);
      } catch (error) {
        let msg = error.message;
        if (error.code === 'auth/popup-blocked') msg = 'Popup blocked - allow popups.';
        if (error.code === 'auth/popup-closed-by-user') msg = 'Sign-in cancelled.';
        err.textContent = msg;
        err.classList.remove('hidden');
        btn.disabled = false;
      }
    });

    document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const userDoc = await getDoc(doc(db, "users", user.uid));
          const role = (userDoc.exists() && userDoc.data().role) ? userDoc.data().role : 'worker';
          currentUser = { uid: user.uid, role: role, email: user.email };
          document.getElementById('user-role-badge').textContent = currentUser.role.toUpperCase();
          document.getElementById('auth-gateway').classList.add('hidden');
        } catch(e) {
          console.error(e);
          // Fallback if users collection is inaccessible
          currentUser = { uid: user.uid, role: 'worker', email: user.email };
          document.getElementById('user-role-badge').textContent = 'WORKER';
          document.getElementById('auth-gateway').classList.add('hidden');
        }
      } else {
        currentUser = null;
        document.getElementById('auth-gateway').classList.remove('hidden');
        document.getElementById('btn-google-login').disabled = false;
        nav('main-menu');
      }
    });

    // --- CORE TRANSACTION: VERIFY COUNT ---
    window.verifyCount = async (docId, oldQty, newQtyInputId) => {
      const input = document.getElementById(newQtyInputId);
      const newQty = parseInt(input.value, 10);
      if (isNaN(newQty) || newQty < 0) return toast('Invalid count', 'error');
      
      input.disabled = true;
      try {
        const docRef = doc(db, 'inventory', docId);
        await runTransaction(db, async (tx) => {
          const docSnap = await tx.get(docRef);
          if (!docSnap.exists()) throw "Document missing!";
          const actualOldQty = docSnap.data().quantity;
          
          if (newQty !== actualOldQty) {
            const logRef = doc(collection(db, 'discrepancies'));
            tx.set(logRef, {
               inventory_id: docId,
               sku: docSnap.data().sku,
               room: docSnap.data().room,
               aisle: docSnap.data().aisle,
               bay: docSnap.data().bay,
               bin: docSnap.data().bin,
               expected_qty: actualOldQty,
               actual_qty: newQty,
               variance: newQty - actualOldQty,
               worker_uid: currentUser.uid,
               timestamp: serverTimestamp()
            });
          }
          
          tx.update(docRef, { 
            quantity: newQty, 
            last_counted_at: serverTimestamp(),
            last_counted_by: currentUser.uid
          });
        });
        toast('Count verified!');
        input.classList.add('bg-emerald-50', 'border-emerald-300', 'text-emerald-700');
      } catch (err) {
        toast(err.message, 'error');
        input.disabled = false;
      }
    };

    // --- MODULE 1: SEARCH & COUNT ---
    document.getElementById('btn-do-search').addEventListener('click', async () => {
      const sku = document.getElementById('search-sku').value.trim().toUpperCase();
      if (!sku) return;
      const resDiv = document.getElementById('search-results');
      resDiv.innerHTML = '<p class="text-slate-500 text-center text-sm mt-4">Searching...</p>';
      
      const q = query(collection(db, 'inventory'), where('sku', '==', sku));
      const snap = await getDocs(q);
      
      if (snap.empty) {
        resDiv.innerHTML = '<p class="text-red-500 text-center text-sm mt-4 font-bold">SKU not found in any location.</p>';
        return;
      }

      let html = `<p class="text-sm font-bold text-slate-700 mb-2">Found in ${snap.size} location(s):</p>`;
      snap.forEach(d => {
        const data = d.data();
        html += `
          <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm flex items-center justify-between gap-4">
            <div>
              <p class="font-mono font-bold text-blue-600 text-sm">${formatLoc(data)}</p>
              <p class="text-xs text-slate-500 uppercase tracking-wide">Current System Qty: <span class="font-bold text-slate-800">${data.quantity}</span></p>
            </div>
            <div class="flex items-center gap-2">
              <input type="number" id="sc-${d.id}" value="${data.quantity}" min="0" class="w-16 border border-slate-300 rounded px-2 py-2 text-center font-bold focus:outline-blue-500">
              <button onclick="verifyCount('${d.id}', ${data.quantity}, 'sc-${d.id}')" class="bg-slate-100 text-slate-600 hover:bg-emerald-100 hover:text-emerald-700 px-3 py-2 rounded font-bold border border-slate-200 transition">OK</button>
            </div>
          </div>
        `;
      });
      resDiv.innerHTML = html;
    });

    // --- MODULE 2: LOCATION COUNT ---
    document.getElementById('btn-do-bin').addEventListener('click', async () => {
      const room = document.getElementById('lc-room').value.trim().toUpperCase();
      const aisle = document.getElementById('lc-aisle').value.trim().toUpperCase();
      const bay = document.getElementById('lc-bay').value.trim().toUpperCase();
      const bin = document.getElementById('lc-bin').value.trim().toUpperCase();
      
      if (!room && !aisle && !bay && !bin) return toast('Enter at least one location criteria', 'error');

      const resDiv = document.getElementById('bin-results');
      resDiv.innerHTML = '<p class="text-slate-500 text-center text-sm mt-4">Searching...</p>';
      
      let q = collection(db, 'inventory');
      if (room) q = query(q, where('room', '==', room));
      if (aisle) q = query(q, where('aisle', '==', aisle));
      if (bay) q = query(q, where('bay', '==', bay));
      if (bin) q = query(q, where('bin', '==', bin));

      const snap = await getDocs(q);
      
      if (snap.empty) {
        resDiv.innerHTML = '<p class="text-amber-600 text-center text-sm mt-4 font-bold">Location is empty or not found.</p>';
        return;
      }

      let html = `<p class="text-sm font-bold text-slate-700 mb-2">Contains ${snap.size} SKU(s):</p>`;
      snap.forEach(d => {
        const data = d.data();
        html += `
          <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm flex flex-col gap-2">
            <div class="flex items-center justify-between">
              <p class="font-mono font-bold text-purple-600">${data.sku}</p>
              <div class="flex items-center gap-2">
                <input type="number" id="bc-${d.id}" value="${data.quantity}" min="0" class="w-16 border border-slate-300 rounded px-2 py-2 text-center font-bold focus:outline-purple-500">
                <button onclick="verifyCount('${d.id}', ${data.quantity}, 'bc-${d.id}')" class="bg-slate-100 text-slate-600 hover:bg-emerald-100 hover:text-emerald-700 px-3 py-2 rounded font-bold border border-slate-200 transition">OK</button>
              </div>
            </div>
            <p class="text-xs text-slate-500 font-mono">${formatLoc(data)}</p>
          </div>
        `;
      });
      resDiv.innerHTML = html;
    });

    // --- MODULE 3: ASSIGN (PUTAWAY) ---
    document.getElementById('form-putaway').addEventListener('submit', async (e) => {
      e.preventDefault();
      const sku = document.getElementById('put-sku').value.trim().toUpperCase();
      const room = document.getElementById('put-room').value.trim().toUpperCase();
      const aisle = document.getElementById('put-aisle').value.trim().toUpperCase();
      const bay = document.getElementById('put-bay').value.trim().toUpperCase();
      const bin = document.getElementById('put-bin').value.trim().toUpperCase();
      const qty = parseInt(document.getElementById('put-qty').value, 10);
      const btn = document.getElementById('btn-do-putaway');

      btn.disabled = true; btn.textContent = 'Storing...';
      
      try {
        await runTransaction(db, async (tx) => {
          let q = query(collection(db, 'inventory'), 
             where('sku', '==', sku),
             where('room', '==', room),
             where('aisle', '==', aisle),
             where('bay', '==', bay),
             where('bin', '==', bin)
          );
          const snap = await getDocs(q);
          
          if (!snap.empty) {
            tx.update(snap.docs[0].ref, { quantity: increment(qty), updated_at: serverTimestamp() });
          } else {
            const newDoc = doc(collection(db, 'inventory'));
            tx.set(newDoc, {
              sku, room, aisle, bay, bin,
              quantity: qty,
              item_name: 'Assigned via Mobile',
              updated_at: serverTimestamp()
            });
          }
        });
        toast(`Stored ${qty}x ${sku}`);
        document.getElementById('put-qty').value = '';
        document.getElementById('put-sku').value = '';
        document.getElementById('put-sku').focus();
      } catch (err) {
        toast(err.message, 'error');
      }
      btn.disabled = false; btn.textContent = 'Store Item';
    });

    // --- MODULE 4: MOVE (BIN-TO-BIN) ---
    document.getElementById('form-move').addEventListener('submit', async (e) => {
      e.preventDefault();
      const sku = document.getElementById('mv-sku').value.trim().toUpperCase();
      const qty = parseInt(document.getElementById('mv-qty').value, 10);
      
      const sRoom = document.getElementById('mv-src-room').value.trim().toUpperCase();
      const sAisle = document.getElementById('mv-src-aisle').value.trim().toUpperCase();
      const sBay = document.getElementById('mv-src-bay').value.trim().toUpperCase();
      const sBin = document.getElementById('mv-src-bin').value.trim().toUpperCase();

      const dRoom = document.getElementById('mv-dest-room').value.trim().toUpperCase();
      const dAisle = document.getElementById('mv-dest-aisle').value.trim().toUpperCase();
      const dBay = document.getElementById('mv-dest-bay').value.trim().toUpperCase();
      const dBin = document.getElementById('mv-dest-bin').value.trim().toUpperCase();

      const srcStr = `${sRoom}/${sAisle}/${sBay}/${sBin}`;
      const destStr = `${dRoom}/${dAisle}/${dBay}/${dBin}`;

      if (srcStr === destStr) return toast("Source and Destination are the same.", "error");

      const btn = document.getElementById('btn-do-move');
      btn.disabled = true; btn.textContent = 'Transferring...';

      try {
        await runTransaction(db, async (tx) => {
          // Find Source Doc
          const srcQ = query(collection(db, 'inventory'), 
             where('sku', '==', sku), where('room', '==', sRoom), where('aisle', '==', sAisle), where('bay', '==', sBay), where('bin', '==', sBin)
          );
          const srcSnap = await getDocs(srcQ);
          if (srcSnap.empty) throw new Error(`SKU ${sku} not found in Source Location.`);
          const srcDoc = srcSnap.docs[0];
          
          if (srcDoc.data().quantity < qty) throw new Error(`Not enough stock in source (Has ${srcDoc.data().quantity})`);

          // Find Dest Doc
          const destQ = query(collection(db, 'inventory'), 
             where('sku', '==', sku), where('room', '==', dRoom), where('aisle', '==', dAisle), where('bay', '==', dBay), where('bin', '==', dBin)
          );
          const destSnap = await getDocs(destQ);

          // Execute Writes
          tx.update(srcDoc.ref, { quantity: increment(-qty), updated_at: serverTimestamp() });
          
          if (!destSnap.empty) {
             tx.update(destSnap.docs[0].ref, { quantity: increment(qty), updated_at: serverTimestamp() });
          } else {
             const newDoc = doc(collection(db, 'inventory'));
             tx.set(newDoc, {
               sku, room: dRoom, aisle: dAisle, bay: dBay, bin: dBin,
               quantity: qty,
               item_name: srcDoc.data().item_name || 'Transferred Item',
               updated_at: serverTimestamp()
             });
          }
        });
        toast(`Moved ${qty}x ${sku}`);
        document.getElementById('form-move').reset();
      } catch (err) {
        toast(err.message, 'error');
      }
      btn.disabled = false; btn.textContent = 'Transfer Item';
    });
  </script>
</body>
</html>
