<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>proofinv — Task Wizard</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="firebase-inv.js"></script>
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    #camera-canvas { display: none; }
    .tab-btn.active { background: rgba(99,102,241,0.16); color: #6366f1; border-color: rgba(99,102,241,0.4); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen">

  <!-- Auth -->
  <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/90 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4 space-y-4">
      <h1 class="text-2xl font-black text-center">proofinv Wizard</h1>
      <p class="text-sm text-slate-500 text-center">Sign in to use the task wizard</p>
      <form id="login-form" class="space-y-3">
        <input id="le" type="email" placeholder="Email" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" />
        <input id="lp" type="password" placeholder="Password" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" />
        <div id="login-err" class="text-red-500 text-xs font-semibold hidden"></div>
        <button id="login-btn" type="submit" class="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold transition">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Header -->
  <nav class="bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between flex-wrap gap-2">
    <h1 class="text-lg font-black mono text-indigo-600 dark:text-indigo-400">proofinv · Wizard</h1>
    <div class="flex items-center gap-2">
      <span id="user-badge" class="hidden text-xs text-slate-500 truncate max-w-[140px]"></span>
      <a href="proofinv.html" class="text-xs px-3 py-1.5 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-indigo-100 text-slate-600 transition font-semibold">Dashboard</a>
      <button id="btn-logout" class="hidden text-xs px-3 py-1.5 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-red-100 dark:hover:bg-red-900/30 text-slate-600 transition">Out</button>
    </div>
  </nav>

  <main id="app-main" class="hidden p-4 max-w-4xl mx-auto space-y-4">
    <!-- Tab nav -->
    <div class="flex gap-2 flex-wrap">
      <button class="tab-btn active px-4 py-2 rounded-xl border border-slate-300 dark:border-slate-600 text-sm font-bold transition" data-tab="count">🔍 Search &amp; Count</button>
      <button class="tab-btn px-4 py-2 rounded-xl border border-slate-300 dark:border-slate-600 text-sm font-bold transition" data-tab="putaway">📦 Putaway / Assign</button>
      <button class="tab-btn px-4 py-2 rounded-xl border border-slate-300 dark:border-slate-600 text-sm font-bold transition" data-tab="transfer">↔ Bin-to-Bin Transfer</button>
    </div>

    <!-- Tab 1: Search & Count -->
    <section id="tab-count" class="space-y-3 bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-200 dark:border-slate-700">
      <h2 class="font-black text-sm uppercase tracking-wider text-slate-500">Search &amp; Count</h2>
      <!-- OCR toggle -->
      <div class="flex items-center gap-3 flex-wrap">
        <div class="flex items-center gap-2">
          <span class="text-xs font-semibold text-slate-500">OCR:</span>
          <button id="ocr-toggle-sku" class="px-3 py-1 rounded-lg text-xs font-bold bg-slate-200 dark:bg-slate-700 text-slate-600 hover:bg-indigo-100 transition">SKU</button>
          <button id="ocr-toggle-loc" class="px-3 py-1 rounded-lg text-xs font-bold bg-slate-200 dark:bg-slate-700 text-slate-600 hover:bg-indigo-100 transition">Location</button>
          <span id="ocr-status" class="text-[10px] text-slate-400 font-medium">OFF</span>
        </div>
        <div class="flex items-center gap-2">
          <button id="btn-capture" class="hidden px-3 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold transition">📸 Capture</button>
          <button id="btn-camera-close" class="hidden px-3 py-1.5 rounded-lg bg-red-100 text-red-600 text-xs font-bold transition">✕ Cam</button>
        </div>
      </div>
      <video id="camera-video" class="hidden w-full max-w-[360px] rounded-xl border border-slate-300 shadow" autoplay playsinline muted></video>
      <canvas id="camera-canvas"></canvas>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">SKU</label>
          <input id="count-sku" type="text" placeholder="e.g. FB-M8-50" class="mono w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Item Name (optional, for new items)</label>
          <input id="count-name" type="text" placeholder="Item name" class="w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>
      </div>
      <button id="btn-count-search" class="px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm transition">Search</button>
      <!-- Locations for this SKU -->
      <div id="count-results" class="hidden mt-2 border-t border-slate-200 dark:border-slate-700 pt-2 space-y-2">
        <p id="count-title" class="text-sm font-bold text-slate-600 dark:text-slate-300"></p>
        <div id="count-locs" class="space-y-1.5 max-h-72 overflow-y-auto scrollbar-thin"></div>
      </div>
    </section>

    <!-- Tab 2: Putaway / Assign -->
    <section id="tab-putaway" class="hidden space-y-3 bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-200 dark:border-slate-700">
      <h2 class="font-black text-sm uppercase tracking-wider text-slate-500">Putaway / Assign</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Room</label><input id="pa-room" type="text" placeholder="e.g. 1" class="mono w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none uppercase" maxlength="4" /></div>
        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Aisle</label><input id="pa-aisle" type="text" placeholder="e.g. A" class="mono w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none uppercase" maxlength="4" /></div>
        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Bay</label><input id="pa-bay" type="text" placeholder="e.g. 01" class="mono w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none uppercase" maxlength="4" /></div>
        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Bin</label><input id="pa-bin" type="text" placeholder="e.g. 04" class="mono w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none uppercase" maxlength="4" /></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div><label class="block text-xs font-semibold text-slate-500 mb-1">SKU</label><input id="pa-sku" type="text" placeholder="e.g. FB-M8-50" class="mono w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Item Name (required for new SKU)</label><input id="pa-name" type="text" placeholder="Item name" class="w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
      </div>
      <div class="flex items-center gap-3">
        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Quantity</label><input id="pa-qty" type="number" min="1" value="1" class="w-24 px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
        <button id="btn-putaway" class="px-5 py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm transition mt-5">Assign · Putaway</button>
      </div>
    </section>

    <!-- Tab 3: Bin-to-Bin Transfer -->
    <section id="tab-transfer" class="hidden space-y-3 bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-200 dark:border-slate-700">
      <h2 class="font-black text-sm uppercase tracking-wider text-slate-500">Bin-to-Bin Transfer</h2>
      <p class="text-xs text-slate-500">Source → Destination (same SKU, atomic Firestore transaction)</p>
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2 p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/30">
          <p class="text-xs font-bold text-red-500">SOURCE</p>
          <div class="grid grid-cols-2 gap-2">
            <input id="tf-s-room" placeholder="Room" class="mono w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-red-400 outline-none uppercase text-xs" maxlength="4" />
            <input id="tf-s-aisle" placeholder="Aisle" class="mono w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-red-400 outline-none uppercase text-xs" maxlength="4" />
            <input id="tf-s-bay" placeholder="Bay" class="mono w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-red-400 outline-none uppercase text-xs" maxlength="4" />
            <input id="tf-s-bin" placeholder="Bin" class="mono w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-red-400 outline-none uppercase text-xs" maxlength="4" />
          </div>
        </div>
        <div class="space-y-2 p-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/30">
          <p class="text-xs font-bold text-emerald-500">DESTINATION</p>
          <div class="grid grid-cols-2 gap-2">
            <input id="tf-d-room" placeholder="Room" class="mono w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-400 outline-none uppercase text-xs" maxlength="4" />
            <input id="tf-d-aisle" placeholder="Aisle" class="mono w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-400 outline-none uppercase text-xs" maxlength="4" />
            <input id="tf-d-bay" placeholder="Bay" class="mono w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-400 outline-none uppercase text-xs" maxlength="4" />
            <input id="tf-d-bin" placeholder="Bin" class="mono w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-400 outline-none uppercase text-xs" maxlength="4" />
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div><label class="block text-xs font-semibold text-slate-500 mb-1">SKU</label><input id="tf-sku" type="text" placeholder="e.g. FB-M8-50" class="mono w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Item Name</label><input id="tf-name" type="text" placeholder="Item name" class="w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
      </div>
      <div class="flex items-center gap-3">
        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Qty to Move</label><input id="tf-qty" type="number" min="1" value="1" class="w-24 px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
        <button id="btn-transfer" class="px-5 py-2.5 rounded-xl bg-amber-600 hover:bg-amber-700 text-white font-bold text-sm transition mt-5">Execute Transfer</button>
      </div>
    </section>
  </main>

  <script>
  'use strict';
  var D = function(id){return document.getElementById(id);};

  // Auth
  auth.onAuthStateChanged(function(u){
    if(u){ D('login-overlay').classList.add('hidden'); D('app-main').classList.remove('hidden');
      var b = D('user-badge'); b.classList.remove('hidden'); b.textContent = u.email;
      D('btn-logout').classList.remove('hidden');
    }else{ D('login-overlay').classList.remove('hidden'); D('app-main').classList.add('hidden');
      D('user-badge').classList.add('hidden'); D('btn-logout').classList.add('hidden');
    }
  });
  D('login-form').addEventListener('submit',function(e){e.preventDefault();
    var em=D('le').value.trim(),pw=D('lp').value;
    D('login-err').classList.add('hidden'); var b=D('login-btn'); b.textContent='Signing in…';b.disabled=true;
    auth.signInWithEmailAndPassword(em,pw).catch(function(err){
      var m={'auth/user-not-found':'No account','auth/wrong-password':'Wrong password','auth/invalid-email':'Invalid email','auth/too-many-requests':'Too many tries'};
      D('login-err').textContent=m[err.code]||err.message; D('login-err').classList.remove('hidden');
    }).finally(function(){b.textContent='Sign In';b.disabled=false;});
  });
  D('btn-logout').addEventListener('click',function(){auth.signOut();});

  function toast(m,c){ var d=document.createElement('div');
    d.className='fixed bottom-4 left-1/2 -translate-x-1/2 z-[200] px-4 py-2 rounded-full text-white text-xs font-semibold shadow-lg '+(c==='error'?'bg-red-600':c==='success'?'bg-emerald-600':'bg-slate-700');
    d.textContent=m; document.body.appendChild(d); setTimeout(function(){d.remove();},2500);
  }

  // Tab switching
  var tabs=['count','putaway','transfer'];
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.addEventListener('click',function(){
      var t=b.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      tabs.forEach(function(k){ var el=D('tab-'+k); if(el)el.classList.add('hidden'); });
      var el=D('tab-'+t); if(el)el.classList.remove('hidden');
    });
  });

  // ── OCR Camera (Tesseract.js) ──
  var cameraStream=null, ocrTarget='sku';
  D('ocr-toggle-sku').addEventListener('click',function(){ocrTarget='sku';D('ocr-status').textContent='→ SKU';D('ocr-toggle-sku').classList.add('bg-indigo-100');D('ocr-toggle-loc').classList.remove('bg-indigo-100');});
  D('ocr-toggle-loc').addEventListener('click',function(){ocrTarget='loc';D('ocr-status').textContent='→ Location';D('ocr-toggle-loc').classList.add('bg-indigo-100');D('ocr-toggle-sku').classList.remove('bg-indigo-100');});

  function stopCamera(){
    if(cameraStream){ cameraStream.getTracks().forEach(function(t){t.stop();}); cameraStream=null; }
    D('camera-video').classList.add('hidden'); D('btn-capture').classList.add('hidden'); D('btn-camera-close').classList.add('hidden');
  }
  D('btn-camera-close').addEventListener('click',stopCamera);

  function startCamera(){
    stopCamera();
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(stream){
      cameraStream=stream; D('camera-video').srcObject=stream;
      D('camera-video').classList.remove('hidden'); D('btn-capture').classList.remove('hidden'); D('btn-camera-close').classList.remove('hidden');
    }).catch(function(e){toast('Camera error: '+e.message,'error');});
  }
  D('ocr-toggle-sku').addEventListener('dblclick',startCamera);
  D('ocr-toggle-loc').addEventListener('dblclick',startCamera);

  // Capture & OCR
  D('btn-capture').addEventListener('click',function(){
    var vid=D('camera-video'), cnv=D('camera-canvas');
    if(!vid.srcObject){toast('No camera active','error');return;}
    cnv.width=vid.videoWidth; cnv.height=vid.videoHeight;
    var ctx=cnv.getContext('2d'); ctx.drawImage(vid,0,0,cnv.width,cnv.height);
    var dataUrl=cnv.toDataURL('image/png');
    D('ocr-status').textContent='OCR running…';
    Tesseract.recognize(dataUrl,'eng',{logger:function(m){if(m.status==='recognizing text')D('ocr-status').textContent='OCR '+(Math.round(m.progress*100))+'%';}})
      .then(function(r){ var txt=(r.data.text||'').trim();
        if(ocrTarget==='sku'){
          var m=txt.match(/[A-Z0-9\-_.]{2,60}/i); D('count-sku').value=m?m[0].toUpperCase():txt.substr(0,60);
        }else{
          // Parse into room/aisle/bay/bin heuristically
          var parts=txt.split(/[\s,\-|\/]+/).filter(Boolean).map(function(s){return s.trim().toUpperCase();});
          if(parts.length>=4){ D('pa-room').value=parts[0]; D('pa-aisle').value=parts[1]; D('pa-bay').value=parts[2]; D('pa-bin').value=parts[3]; }
          else if(parts.length>=1){ var p0=parts[0]; if(p0.match(/^[A-Z]\d?/)){D('pa-aisle').value=p0;}else{D('pa-room').value=p0;} }
          D('pa-sku').value = D('count-sku').value;
        }
        D('ocr-status').textContent='OK ✓'; toast('OCR captured','success'); stopCamera();
      })
      .catch(function(e){D('ocr-status').textContent='FAIL';toast('OCR failed: '+e.message,'error');});
  });

  // ── Search & Count ──
  // Helpers
  function normId(sku,room,aisle,bay,bin){ return sku+'_R'+room+'_A'+aisle+'_B'+bay+'_B'+bin; }
  function S(v){ var s=String(v||'').trim().toUpperCase(); return s.replace(/\s+/g,''); }
  function setFields(obj){ for(var k in obj){if(obj.hasOwnProperty(k)){var el=D(k);if(el)el.value=obj[k];}} }

  D('btn-count-search').addEventListener('click',function(){
    var sku=S(D('count-sku').value); if(!sku){toast('Enter a SKU','error');return;}
    var name=(D('count-name').value||'').trim()||'Unknown-'+sku;
    db.collection('inventory').where('sku','==',sku).get().then(function(snap){
      var locs=[]; snap.forEach(function(d){locs.push({id:d.id,room:d.data().room||'',aisle:d.data().aisle||'',bay:d.data().bay||'',bin:d.data().bin||'',qty:Number(d.data().quantity)||0,sku:d.data().sku,name:d.data().item_name||d.data().name||name});});
      var el=D('count-results'); el.classList.remove('hidden');
      if(!locs.length){
        D('count-title').textContent=sku+' — no existing bin records (use Putaway tab)'; D('count-locs').innerHTML='';
      }else{
        D('count-title').textContent=sku+' ('+(locs[0].name||'')+') — '+locs.length+' bin record(s)';
        D('count-locs').innerHTML=locs.map(function(l,i){
          return '<div class="flex items-center gap-2 flex-wrap bg-slate-50 dark:bg-slate-700/50 rounded-lg p-2 border border-slate-200 dark:border-slate-600">'
            + '<span class="mono text-xs font-bold text-indigo-600 dark:text-indigo-400 min-w-[120px]">R'+(l.room||'-')+'-A'+(l.aisle||'-')+'-B'+(l.bay||'-')+'-B'+(l.bin||'-')+'</span>'
            + '<span class="text-xs text-slate-500">Qty recorded:</span>'
            + '<input id="lq-' + l.id.replace(/[^a-zA-Z0-9_]/g,'_') + '" type="number" min="0" value="'+l.qty+'" class="w-20 px-2 py-1.5 rounded-lg border border-slate-300 mono text-sm text-center font-bold" />'
            + '<button onclick="verifyOne(\''+l.id+'\','+l.qty+',\''+l.sku+'\',\''+(l.name||'').replace(/'/g,"\\\'")+'\')" class="px-3 py-1.5 rounded-lg bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 text-xs font-bold hover:bg-emerald-200 transition">OK</button>'
            + '</div>';
        }).join('');
      }
    }).catch(function(e){toast('DB error: '+e.message,'error');});
  });

  window.verifyOne = function(id,oldQty,sku,name){
    var elId = 'lq-' + id.replace(/[^a-zA-Z0-9_]/g,'_');
    var inp = document.getElementById(elId);
    var newQty = Math.max(0, parseInt(inp.value,10)||0);
    if(isNaN(newQty)){toast('Invalid qty','error');return;}
    // Transaction: update quantity + log discrepancy if changed
    db.runTransaction(function(tx){
      return tx.get(db.collection('inventory').doc(id)).then(function(doc){
        if(!doc.exists) throw new Error('Doc '+id+' vanished');
        var q = Math.max(0, Number(doc.data().quantity)||0);
        tx.update(doc.ref,{quantity:newQty,updated_at:firebase.firestore.FieldValue.serverTimestamp()});
        if(newQty!==q){
          var logRef=db.collection('discrepancies').doc();
          tx.set(logRef,{inventory_id:id,sku:sku,name:name,expected_qty:q,actual_qty:newQty,variance:newQty-q,worker_uid:auth.currentUser.uid,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
        }
      });
    }).then(function(){toast(id.substr(0,12)+'… updated to '+newQty,'success');inp.value=newQty;})
    .catch(function(e){toast('Tx failed: '+e.message,'error');});
  };

  // ── Putaway / Assign ──
  D('btn-putaway').addEventListener('click',function(){
    var room=S(D('pa-room').value),aisle=S(D('pa-aisle').value),bay=S(D('pa-bay').value),bin=S(D('pa-bin').value);
    var sku=S(D('pa-sku').value),name=(D('pa-name').value||'').trim(), qty=Math.max(1,parseInt(D('pa-qty').value,10)||1);
    if(!sku||!room||!aisle||!bay||!bin){toast('Fill all SKU + Room/Aisle/Bay/Bin','error');return;}
    if(!name){toast('Item name required for new SKU','error');return;}

    var docId = normId(sku,room,aisle,bay,bin);
    var ref = db.collection('inventory').doc(docId);
    db.runTransaction(function(tx){
      return tx.get(ref).then(function(doc){
        var oldQty = doc.exists ? Math.max(0, Number(doc.data().quantity)||0) : 0;
        var newQty = oldQty + qty;
        tx.set(ref,{sku:sku,item_name:name,room:room,aisle:aisle,bay:bay,bin:bin,quantity:newQty,updated_at:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
        document.querySelectorAll('#tab-putaway input').forEach(function(i){i.value='';});
        D('pa-qty').value=1;
      });
    }).then(function(){toast('Putaway OK: '+sku+' +'+qty+' → R'+room+'-A'+aisle+'-B'+bay+'-B'+bin,'success');})
    .catch(function(e){toast('Tx error: '+e.message,'error');});
  });

  // ── Bin-to-Bin Transfer (atomic) ──
  D('btn-transfer').addEventListener('click',function(){
    var sRoom=S(D('tf-s-room').value),sAisle=S(D('tf-s-aisle').value),sBay=S(D('tf-s-bay').value),sBin=S(D('tf-s-bin').value);
    var dRoom=S(D('tf-d-room').value),dAisle=S(D('tf-d-aisle').value),dBay=S(D('tf-d-bay').value),dBin=S(D('tf-d-bin').value);
    var sku=S(D('tf-sku').value),name=(D('tf-name').value||'').trim(), qty=Math.max(1,parseInt(D('tf-qty').value,10)||1);
    if(!sku||!sRoom||!sAisle||!sBay||!sBin||!dRoom||!dAisle||!dBay||!dBin){toast('Fill all source + dest coordinates','error');return;}
    if(!name){toast('Item name required','error');return;}
    if(sRoom===dRoom&&sAisle===dAisle&&sBay===dBay&&sBin===dBin){toast('Source == destination','error');return;}

    var srcId=normId(sku,sRoom,sAisle,sBay,sBin), dstId=normId(sku,dRoom,dAisle,dBay,dBin);
    var srcRef=db.collection('inventory').doc(srcId), dstRef=db.collection('inventory').doc(dstId);
    db.runTransaction(function(tx){
      return tx.get(srcRef).then(function(srcDoc){
        if(!srcDoc.exists||(Number(srcDoc.data().quantity)||0)<qty) throw new Error('Not enough stock at source (has '+(srcDoc.exists?(Number(srcDoc.data().quantity)||0):0)+')');
        var srcQtyNow=Math.max(0,(Number(srcDoc.data().quantity)||0)-qty);
        tx.update(srcRef,{quantity:srcQtyNow,updated_at:firebase.firestore.FieldValue.serverTimestamp()});
        return tx.get(dstRef);
      }).then(function(dstDoc){
        var dstQtyNow = (dstDoc.exists ? Math.max(0, Number(dstDoc.data().quantity)||0) : 0) + qty;
        tx.set(dstRef,{sku:sku,item_name:name,room:dRoom,aisle:dAisle,bay:dBay,bin:dBin,quantity:dstQtyNow,updated_at:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
        // Clear source if zero or negative
        if(srcQtyNow<=0){ tx.delete(srcRef); } else { tx.update(srcRef,{quantity:srcQtyNow,updated_at:firebase.firestore.FieldValue.serverTimestamp()}); }
        document.querySelectorAll('#tab-transfer input').forEach(function(i){i.value='';});
        D('tf-qty').value=1;
      });
    }).then(function(){toast('Transfer OK: '+qty+' '+sku+' moved','success');})
    .catch(function(e){toast('Tx failed: '+e.message,'error');});
  });
  </script>
</body>
